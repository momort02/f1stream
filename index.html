<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 30px;
        }
        .films-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .film-card {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .film-card:hover {
            transform: scale(1.05);
        }
        .film-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .film-title {
            padding: 10px;
            background-color: #1a1a1a;
            text-align: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 900px;
            height: 90vh;
        }
        .modal video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stream</h1>
        <div class="films-grid" id="filmsGrid"></div>
    </div>

    <!-- Modal pour lire les vidéos -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeVideo()">&times;</span>
            <video id="videoPlayer" controls autoplay>
                <source src="" type="video/mp4">
                Votre navigateur ne supporte pas la lecture vidéo.
            </video>
        </div>
    </div>

    <script>
        const films = [
            {
                "title": "Flash",
                "videoUrl": "https://cinefries.xyz/movies/The-Flash.mp4",
                "posterUrl": "https://image.tmdb.org/t/p/original/azio74W2qw7bNg7ePqzkWywwK1n.jpg"
            },
            {
                "title": "Blue Beetle",
                "videoUrl": "https://cinefries.xyz/movies/Blue-Beetle.mp4",
                "posterUrl": "https://www.themoviedb.org/t/p/original/xSVtl6ZF7fNuZIoXkZbzI2EzoAD.jpg"
            },
            {
                "title": "F1",
                "videoUrl": "https://cinefries.xyz/movies/F1-The-Movie.mp4",
                "posterUrl": "https://www.themoviedb.org/t/p/w3840_and_h2160_multi_faces/lSbblLngbeZIn6G4WXDcyQ6SLhw.jpg"
            },
            {
                "title": "Agent presque secret",
                "videoUrl": "https://cinefries.xyz/movies/Agents-presque-secrets.mp4",
                "posterUrl": "https://www.themoviedb.org/t/p/original/12168YxdkIgBBcmfNLWO2PI6aXE.jpg"
            }
        ];

        const grid = document.getElementById('filmsGrid');
        const videoModal = document.getElementById('videoModal');
        const videoPlayer = document.getElementById('videoPlayer');
    
        // Sauvegarder progression
videoPlayer.addEventListener('timeupdate', () => {
    if (videoPlayer.currentTime > 5) { 
        localStorage.setItem(videoPlayer.src, videoPlayer.currentTime);
    }
});

// Reprendre progression si existante
videoPlayer.addEventListener('loadedmetadata', () => {
    const savedTime = localStorage.getItem(videoPlayer.src);
    if (savedTime) {
        videoPlayer.currentTime = parseFloat(savedTime);
    }
});

        films.forEach(film => {
            const card = document.createElement('div');
            card.className = 'film-card';
            card.innerHTML = `
                <img src="${film.posterUrl}" alt="${film.title}" class="film-poster">
                <div class="film-title">${film.title}</div>
            `;
            card.onclick = () => openVideo(film.videoUrl);
            grid.appendChild(card);
        });

        function openVideo(videoUrl) {
    videoPlayer.src = videoUrl;
    videoModal.classList.add('active');
}

        function closeVideo() {
            videoModal.classList.remove('active');
            videoPlayer.pause();
            videoPlayer.src = '';
        }

        // Fermer la vidéo en cliquant en dehors du contenu
        videoModal.onclick = (event) => {
            if (event.target === videoModal) {
                closeVideo();
            }
        };

        // Fermer avec la touche Échap
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeVideo();
            }
        });
    </script>
</body>
</html>
