<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lecteur</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:black;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline controls></video>

<script>
const video = document.getElementById('video');
const videoSrc = "https://grand-s-main.faggotsports.tv/out/v2/dfaeda63248ed346a40b4d0fc50c94db/index.m3u8?skf1";

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,function() {
        video.play();
    });
} 
else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
    video.addEventListener('loadedmetadata',function() {
        video.play();
    });
}
</script>
<!-- I dont host any videos -->
</body>
</html>
